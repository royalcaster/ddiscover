name: Build Android APK

on:
  workflow_dispatch:

jobs:
  apk:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
      EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL || vars.EXPO_PUBLIC_CONVEX_URL }}
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_CLERK_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_CLERK_GOOGLE_WEB_CLIENT_ID || vars.EXPO_PUBLIC_CLERK_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_CLERK_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_CLERK_GOOGLE_ANDROID_CLIENT_ID || vars.EXPO_PUBLIC_CLERK_GOOGLE_ANDROID_CLIENT_ID }}
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate public build configuration
        run: |
          missing=0
          for name in \
            EXPO_PUBLIC_CONVEX_URL \
            EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY \
            EXPO_PUBLIC_CLERK_GOOGLE_WEB_CLIENT_ID \
            EXPO_PUBLIC_CLERK_GOOGLE_ANDROID_CLIENT_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing build variable::$name is not set as a GitHub Actions secret or variable."
              missing=1
            else
              echo "$name is set."
            fi
          done
          exit "$missing"

      - name: Generate Android native project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddiscover-android-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14
